<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Webinar JavaScript Desafio: Validador de Cupom">
  <title>Minha Loja Tech</title>
  <link rel="stylesheet" href="./style.css">
</head>

<body>

  <!-- ========== HEADER ========== -->
  <header class="header">
    <h1 class="header__titulo" id="titulo-loja">Minha Loja Tech</h1>
    <div class="header__carrinho">
      Carrinho: <strong>R$ <span id="total-carrinho-contador">0,00</span></strong>
      <span class="badge" id="badge-contador">0</span>
    </div>
  </header>

  <!-- ========== CONTEÚDO PRINCIPAL ========== -->
  <main class="layout layout--com-sidebar">

    <!-- ===== COLUNA ESQUERDA: VITRINE ===== -->
    <section>
      <!-- Banner do Tema -->
      <div class="banner-tema">
        <span class="banner-tema__icone">🏆</span>
        <div class="banner-tema__texto">
          <h2>Tema 8 — Desafio Prático de Fixação</h2>
          <p>Aplique tudo que aprendeu! Crie um validador de cupom de desconto.</p>
        </div>
      </div>

      <!-- ========== VITRINE DE PRODUTOS ========== -->
      <div class="vitrine" id="vitrine-produtos">
        <h2 class="secao-titulo"> Produto em Destaque</h2>
      </div>

      <!-- ========== TEMPLATE DO CARD ========== -->
      <template id="template-card">
        <div class="card">
          <div class="card__imagem"></div>
          <div class="card__corpo">
            <h3 class="card__nome"></h3>
            <p class="card__preco"></p>
            <span class="card__frete"></span>
            <div class="card__detalhe">
              <p class="card__estoque"></p>
              <button class="btn btn--primario btn-adicionar">🛒 Adicionar ao Carrinho</button>
            </div>
          </div>
        </div>
      </template>
    </section>

    <!-- ===== COLUNA DIREITA: SIDEBAR CARRINHO ===== -->
    <aside class="sidebar">
      <h3 class="sidebar__titulo">Resumo do Carrinho</h3>
      <ul class="sidebar__lista" id="lista-itens-carrinho">
        <!-- Itens serão injetados pelo loop for...of -->
      </ul>
      <div class="sidebar__resumo" id="resumo-valores">
        <div class="sidebar__total">
          <span>Total:</span>
          <span id="sidebar-total">R$ 0,00</span>
        </div>
      </div>

      <!-- ========== SEÇÃO DE CUPOM - DESAFIO ========== -->
      <div class="secao-cupom">
        <h4 class="secao-cupom__titulo">Cupom de Desconto</h4>
        <div class="secao-cupom__form">
          <input type="text" class="input" id="input-cupom" placeholder="Digite seu cupom">
          <button class="btn btn--secundario" id="btn-cupom">Aplicar Cupom</button>
        </div>
        <p class="mensagem-cupom" id="mensagem-cupom"></p>
      </div>
    </aside>

  </main>

  <!-- ========== FOOTER ========== -->
  <footer class="footer">
    <p>Webinar JavaScript — TripleTen</p>
  </footer>

  <script src="script.js"></script>
</body>

</html>
